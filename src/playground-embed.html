<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bello SDK – IIFE Test</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; }
      h1 { font-size: 1.5rem; }
      .controls { margin-top: 1rem; display: flex; gap: 0.5rem; }
      button { padding: 0.4rem 0.8rem; cursor: pointer; }
      code { background: #f0f0f0; padding: 0.2rem 0.4rem; border-radius: 3px; font-size: 0.85rem; }
      .note { color: #666; font-size: 0.9rem; margin-top: 0.5rem; }
    </style>
  </head>
  <body>
    <h1>Bello SDK – IIFE Test</h1>
    <p>Widget should appear in the bottom-right corner.</p>

    <div class="controls">
      <button onclick="window.Bello.push(['open'])">Open</button>
      <button onclick="window.Bello.push(['close'])">Close</button>
      <button onclick="window.Bello.push(['update', { theme: 'light' }])">Light theme</button>
      <button onclick="window.Bello.push(['update', { theme: 'dark' }])">Dark theme</button>
    </div>

    <p class="note">
      Edit <code>data-project-id</code> and <code>data-widget-api-key</code> below
      to test with a real project. Point <code>data-api-base-url</code> to your local backend.
    </p>

    <!--
      Replace these with real credentials from your Bello dashboard.
      data-api-base-url is optional — only needed for local development.
    -->
    <script
      src="/dist/bello-embed.iife.js"
      defer
      data-project-id="1e236235-3a52-4ab1-aaae-b2a6527d9e64"
  data-widget-api-key="bello_OXkchVacW9alv1y8lExksqhZiYKWLAzTRr0iIieIV6g"
      data-api-base-url="http://localhost:3001"
    ></script>
  </body>
</html>
